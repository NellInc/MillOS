apiVersion: v1
kind: Secret
metadata:
  name: scada-proxy-secrets
  namespace: millos-scada
  labels:
    app.kubernetes.io/name: scada-proxy
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # OPC-UA Authentication (if required)
  OPCUA_USERNAME: ""
  OPCUA_PASSWORD: ""

  # MQTT Authentication (if required)
  MQTT_USERNAME: ""
  MQTT_PASSWORD: ""

  # API Key for proxy authentication
  # SECURITY: Replace this with your actual API key using kubectl or sealed-secrets
  # DO NOT commit real API keys to git - use external secret management
  # Example: kubectl create secret generic scada-proxy-secrets --from-literal=API_KEY=your-real-key
  API_KEY: ""
